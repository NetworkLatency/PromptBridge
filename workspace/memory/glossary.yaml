terms:
  - term: Context Kernel
    zh: 上下文内核
    note: Structured working set for the current model request.
  - term: Retrieval Router
    zh: 检索路由器
    note: Chooses exact, lexical, structural, semantic, or web retrieval paths.
  - term: Memory Ledger
    zh: 记忆账本
    note: Append-only event log for auditable memory.
  - term: MemoryPatch
    zh: 记忆补丁
    note: Reviewable patch proposal generated by DreamCompactor.
  - term: Tool Economy Layer
    zh: 工具经济层
    note: Keeps always-on tool definitions small and defers heavy tools.
  - term: BrowserBridge
    zh: 浏览器桥接
    note: Thin browser collaboration layer for capture, fill, overlay, and handoff.
  - term: MCP
    zh: Model Context Protocol
    note: External tool/server integration protocol; should be loaded with explicit tool economy constraints.
